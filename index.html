<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Lion Dance Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <span class="app-title">🦁 Lion Dance Trainer</span>
            <span id="audio-filename" class="audio-filename">No audio loaded</span>
        </div>
        <div class="header-right">
            <select id="audio-select">
                <option value="">— Select track —</option>
                <option value="intro.mp3">Intro</option>
                <option value="salade.mp3">Salade</option>
            </select>
            <button id="btn-open-editor">Edit Pattern</button>
            <button id="btn-export">Export JSON</button>
            <button id="btn-import">Import JSON</button>
        </div>
    </header>

    <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
    </div>

    <footer>
        <div class="controls">
            <div class="playback-btns">
                <button id="btn-play" disabled>▶ Play</button>
                <button id="btn-stop" disabled>■ Stop</button>
            </div>
            <div class="control-group">
                <span class="control-label">Speed</span>
                <input type="range" id="speed-slider" min="0.25" max="2" step="0.05" value="1">
                <span id="speed-value">1.00×</span>
            </div>
            <div class="control-group">
                <span class="control-label">Show</span>
                <select id="instrument-select">
                    <option value="both">Both</option>
                    <option value="cymbal">Cymbal only</option>
                    <option value="drum">Drum only</option>
                </select>
            </div>
        </div>
    </footer>

    <!-- ─── Pattern Editor Modal ─────────────────────────── -->
    <div id="editor-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Pattern Editor</h2>
                <button id="btn-close-editor" class="close-btn">✕</button>
            </div>
            <div class="modal-body">

                <!-- Instrument selector -->
                <div class="tabs" id="inst-tabs">
                    <button class="tab inst-tab active" data-inst="cymbal">Cymbal</button>
                    <button class="tab inst-tab" data-inst="drum1">Drum 1</button>
                    <button class="tab inst-tab" data-inst="drum2">Drum 2</button>
                    <button class="tab inst-tab" data-inst="drum3">Drum 3</button>
                    <button class="tab inst-tab" data-inst="drum4">Drum 4</button>
                </div>

                <!-- Live Tap Panel -->
                <div id="panel-tap" class="panel">
                    <p class="hint">
                        Load audio first. During recording press
                        <kbd>C</kbd> for Cymbal and <kbd>S</kbd> <kbd>D</kbd> <kbd>K</kbd> <kbd>L</kbd> for Drums 1–4.
                    </p>
                    <div class="tap-controls">
                        <button id="btn-tap-start">▶ Start Recording</button>
                        <button id="btn-tap-stop" disabled>■ Stop</button>
                        <label class="tap-delay-label">Delay (s)
                            <input type="number" id="tap-delay" value="3" min="0" max="30" step="1">
                        </label>
                    </div>
                    <p id="tap-status" class="hint"></p>
                </div>

                <!-- Fine-tune list (always visible) -->
                <div class="finetune-section">
                    <div class="finetune-header">
                        <h3>Timestamps <span id="ts-count" class="ts-count"></span></h3>
                        <div class="btn-row">
                            <button id="btn-ts-add">+ Add</button>
                            <button id="btn-ts-clear" class="danger">Clear all</button>
                        </div>
                    </div>
                    <div id="finetune-list"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- ─── Tap Recording Overlay (shown over canvas) ────── -->
    <div id="tap-overlay" class="hidden">
        <div class="tap-overlay-inner">
            <div class="tap-overlay-title">TAP MODE</div>
            <div class="tap-keys-row">
                <div class="tap-key cymbal-key">
                    <span class="key-badge">C</span>
                    <span class="key-label">CYMBAL</span>
                    <span class="key-count" id="ov-cymbal">0</span>
                </div>
                <div class="tap-key drum1-key">
                    <span class="key-badge">S</span>
                    <span class="key-label">DRUM 1</span>
                    <span class="key-count" id="ov-drum1">0</span>
                </div>
                <div class="tap-key drum2-key">
                    <span class="key-badge">D</span>
                    <span class="key-label">DRUM 2</span>
                    <span class="key-count" id="ov-drum2">0</span>
                </div>
                <div class="tap-key drum3-key">
                    <span class="key-badge">K</span>
                    <span class="key-label">DRUM 3</span>
                    <span class="key-count" id="ov-drum3">0</span>
                </div>
                <div class="tap-key drum4-key">
                    <span class="key-badge">L</span>
                    <span class="key-label">DRUM 4</span>
                    <span class="key-count" id="ov-drum4">0</span>
                </div>
            </div>
            <button id="btn-tap-overlay-stop">■ Stop Recording</button>
        </div>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="import-file-input" accept=".json" style="display:none">

    <script src="app.js"></script>
</body>
</html>
